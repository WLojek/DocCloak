      <div style="max-width: 720px; margin: 4rem auto; padding: 2rem; font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; color: #111;">
        <h1 style="font-size: 2rem; margin-bottom: 0.5rem;">DocCloak</h1>
        <p style="font-size: 1.25rem; color: #555; margin-top: 0;"><strong>Use AI without leaking client data.</strong></p>

        <p>DocCloak is an open-source document anonymizer that strips personally identifiable information (PII) before you share documents with AI services - and restores the original names in the AI's response. Everything runs in your browser. No server, no API calls, no data leaves your machine.</p>

        <p><strong>This page requires JavaScript to run.</strong> DocCloak performs all PII detection locally in your browser using WebAssembly, so JavaScript and a modern browser are required.</p>

        <h2>Who it's for</h2>
        <ul>
          <li><strong>Lawyers and legal teams</strong> - redact client names from contracts before asking AI to review clauses</li>
          <li><strong>Consultants</strong> - anonymize company data in reports before generating AI summaries</li>
          <li><strong>Healthcare professionals</strong> - strip patient identifiers from notes before using AI for research</li>
          <li><strong>HR departments</strong> - remove employee PII from documents before AI-assisted policy drafting</li>
          <li><strong>Anyone</strong> who uses AI tools but handles sensitive data they can't afford to leak</li>
        </ul>

        <h2>How it works</h2>
        <ol>
          <li><strong>Paste</strong> your document or upload a .doc/.docx file</li>
          <li><strong>Redact</strong> - DocCloak detects names, emails, phone numbers, addresses, and other PII using a local ML model and regex patterns</li>
          <li><strong>Copy</strong> the anonymized text into any AI service (ChatGPT, Claude, Gemini, etc.) - or download the redacted document</li>
          <li><strong>Restore</strong> - paste the AI's response back into DocCloak to replace placeholders with the original names</li>
        </ol>

        <h2>Features</h2>
        <ul>
          <li>Runs locally - ML models run in-browser via ONNX Runtime WebAssembly, zero network requests during anonymization</li>
          <li>12+ entity types: persons, emails, phones, SSNs, credit cards, dates, currencies, IP addresses, IBANs, addresses, companies, custom labels</li>
          <li>Supports .doc and .docx documents with all formatting preserved</li>
          <li>Regex pattern detection for 17 regions including the US and 16 European countries</li>
          <li>8 UI languages: English, Polish, German, French, Spanish, Portuguese, Swedish, Norwegian</li>
          <li>Open source under AGPL-3.0 - every line of code is auditable on GitHub</li>
        </ul>

        <p><a href="https://github.com/WLojek/DocCloak">View source on GitHub</a></p>
